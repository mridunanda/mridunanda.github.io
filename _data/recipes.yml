- name: Avocado Grilled Cheese
  intro: I made this Garlicky Avocado Grilled Cheese savory sandwich for breakfast. However, I didn't have all the ingredients when I decided to make it, so I made the following changes.  
  site: https://www.foodiecrush.com/garlicky-avocado-grilled-cheese-with-tomato-pesto/
  ingredients: modified
  replace: 
    sun dried tomato pesto: chili garlic paste
    provolone cheese: pepperjack cheese
  without: 
    - onion powder
    - garlic powder
    - thyme
  instructions:
    - Cool idea to cover the pan with lid when frying the sandwhich - helps create a nice golden crusy appearence!

- name: Ginger Snap Cookies
  intro: I was inspired to make these cookies while scrolling through my friend's instgram food blog. They looked like the perfect holiday cookies and I was not dissapointed! We ended up making two batches over the holidays. My brother and I had a lot of fun making them :-). 
  site: https://www.cooksillustrated.com/recipes/146-soft-and-chewy-molasses-spice-cookies
  ingredients: modified
  replace: 
    all spices: at least double amount
    sugar: about half amount
  instructions:
    - Best to use a rubber spatual to beat batter. Otherwise get ready to make some arm muscles!
    - Remember more spices and less sugar!
    - Remember to make balls small.
