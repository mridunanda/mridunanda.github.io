---
layout: default
---

<h2 class="post-list-heading">{{ page.title | default: "Food Blog" }}</h2>
<div class="gallery">
	{% for post in site.categories.foodblog %}
		<div class="item">
			<a class="item-inner" href="{{ post.url }}">
	  			{% if post.feature-img %}
    		  	  <div class="item-image"><img src="{{ post.feature-img }}"></div>
  	  			{% endif %}
				<div class="item-name">{{ post.title }}</div>
			</a>
		</div>
	{% endfor %}
</div>
